name: Check Terraform State

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show path
        run: pwd

      - name: List files
        run: ls -la

      - name: Check Terraform state
        run: ls -la terraform.tfstate || echo "No state file found"
